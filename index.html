<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Spiroglyphics &middot; Scroll to Draw</title>
<style>
  /* --bg and --line are the two user colours, randomised on load; every other
     token is UI chrome and flips as a set when the background goes dark */
  :root{ --ink:#111418; --bg:#fbfbf9; --accent:#e4572e; --muted:#8a9099;
    --line:#231f20;        /* the pen colour */
    --ghost:#e2e5e9;       /* the printed guide: a whisper of the bg, computed in JS */
    --surface:#fff; --border:#d7dbe0; --hover:#f2f4f6; --tile:#e8ebee; }
  body.dark{ --ink:#f2f3f5; --muted:#8f959d;
    --surface:#1d2023; --border:#3a3f45; --hover:#272b2f; --tile:#343a40; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    transition:background .5s ease;}
  #track{height:700vh;position:relative;}
  #stage{position:sticky;top:0;height:100vh;height:100svh;display:flex;align-items:center;
    justify-content:center;overflow:hidden;}
  #art{width:min(92vw,calc(90svh * var(--ar,1)));display:block;}

  /* the printed guide: a faint tint of the page, fades away once the line is inked */
  #ghost{fill:var(--ghost);transition:opacity .3s linear,fill .5s ease;}
  /* the inked line: revealed along the spiral by the scroll-driven mask */
  #inked{fill:var(--line);transition:fill .5s ease;}
  body.noguide #ghost{opacity:0 !important;}
  @media (prefers-reduced-motion: reduce){
    #ghost,#inked,html,body{transition:none;}
  }

  #bar{position:fixed;left:0;top:0;height:3px;width:0%;background:var(--accent);z-index:5;}
  #hud{position:fixed;left:0;right:0;top:0;padding:16px 20px;display:flex;align-items:baseline;gap:14px;pointer-events:none;z-index:4;}
  #title{font-size:15px;font-weight:700;}
  #title span{font-weight:400;color:var(--muted);}
  #credit{font-size:11px;color:var(--muted);}
  #count{margin-left:auto;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;color:var(--muted);white-space:nowrap;}
  @media (max-width:600px){
    #title span,#credit{display:none;}
  }
  #btns{position:fixed;right:20px;bottom:22px;z-index:6;display:flex;gap:8px;}
  #btns button{font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--surface);
    border:1px solid var(--border);border-radius:999px;padding:7px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  #btns button:hover{border-color:var(--accent);color:var(--accent);}
  #hint{position:fixed;left:0;right:0;bottom:26px;text-align:center;font-size:13px;color:var(--muted);transition:opacity .4s;pointer-events:none;}
  #done{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:var(--ink);color:var(--surface);
    padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:opacity .5s;pointer-events:none;z-index:5;}
  #done.show{opacity:1;}

  /* artworks switcher (populated from art/manifest.js) */
  #gallery{position:fixed;right:20px;bottom:64px;background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:8px;z-index:7;box-shadow:0 8px 28px rgba(0,0,0,.12);display:none;max-height:60vh;overflow:auto;
    min-width:240px;max-width:calc(100vw - 40px);}
  #gallery.open{display:block;}
  .galItem{display:flex;gap:10px;align-items:center;padding:7px 9px;border-radius:10px;text-decoration:none;color:var(--ink);}
  .galItem:hover{background:var(--hover);}
  .galItem.current{outline:2px solid var(--accent);}
  .galCover{width:34px;height:46px;border-radius:4px;background:var(--tile);flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--muted);overflow:hidden;}
  .galCover img{width:100%;height:100%;object-fit:cover;display:block;}
  .galTitle{font-size:13px;font-weight:700;}
  .galBook{font-size:11px;color:var(--muted);}

  /* book card shown at the completion moment */
  #bookCard{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);display:flex;gap:12px;align-items:center;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 14px;opacity:0;transition:opacity .5s;
    pointer-events:none;z-index:5;box-shadow:0 4px 18px rgba(0,0,0,.1);}
  #bookCard.show{opacity:1;pointer-events:auto;}
  #bookCard .galCover{width:44px;height:60px;font-size:18px;}
  .bcFrom{font-size:11px;color:var(--muted);}
  .bcBook{font-size:13px;font-weight:700;max-width:240px;}
  .bcBuy{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;}
  .bcBuy:hover{text-decoration:underline;}

  /* colours panel — exactly two choices: the line and the page */
  #panel{position:fixed;right:20px;bottom:64px;background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:12px;z-index:7;box-shadow:0 8px 28px rgba(0,0,0,.12);display:none;max-height:70vh;overflow:auto;
    max-width:calc(100vw - 40px);}
  #panel.open{display:block;}
  .pLabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:4px 4px 8px;}
  #wells{display:flex;gap:14px;padding:0 4px;align-items:flex-start;}
  .well{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--muted);}
  .well input{width:44px;height:44px;padding:0;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;}
  .well input::-webkit-color-swatch-wrapper{padding:3px;}
  .well input::-webkit-color-swatch{border:none;border-radius:5px;}
</style>
</head>
<body>
  <div id="bar"></div>
  <div id="hud">
    <div id="title">Spiroglyphics <span>&middot; scroll to draw</span></div>
    <div id="credit">Spiroglyphics &middot; by Thomas Pavitte</div>
    <div id="count"></div>
  </div>

  <div id="track">
    <div id="stage">
      <svg id="art" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div id="btns">
    <button id="galBtn" style="display:none">Artworks</button>
    <button id="inkBtn">Colours</button>
    <button id="guideBtn">Hide guide</button>
  </div>

  <div id="gallery"></div>

  <div id="panel">
    <div class="pLabel">Colours</div>
    <div id="wells"></div>
  </div>

  <div id="bookCard"></div>
  <div id="hint">Scroll to draw the line&hellip;</div>
  <div id="done">&#10003; Complete</div>

<script>
(function(){
  if("scrollRestoration" in history) history.scrollRestoration="manual";
  window.scrollTo(0,0);
  window.addEventListener("load",()=>window.scrollTo(0,0));

  const svgNS="http://www.w3.org/2000/svg";
  const art=document.getElementById("art");
  const bar=document.getElementById("bar");
  const count=document.getElementById("count");
  const hint=document.getElementById("hint");
  const done=document.getElementById("done");
  const bookCard=document.getElementById("bookCard");

  /* ---------- the two user colours: the page and the line ---------- */
  const root=document.documentElement;
  function hslHex(h,s,l){s/=100;l/=100;
    const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l);
    const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
    const to=v=>Math.round(v*255).toString(16).padStart(2,"0");
    return "#"+to(f(0))+to(f(8))+to(f(4));}
  function brightness(hex){const n=parseInt(hex.slice(1),16);
    return ((n>>16&255)*299+(n>>8&255)*587+(n&255)*114)/1000;}
  function mix(a,b,t){const A=parseInt(a.slice(1),16),B=parseInt(b.slice(1),16);
    const ch=s=>Math.round((A>>s&255)+((B>>s&255)-(A>>s&255))*t);
    return "#"+[16,8,0].map(s=>ch(s).toString(16).padStart(2,"0")).join("");}

  let bgCol,lineCol;
  function applyColours(){
    const dark=brightness(bgCol)<128;
    root.style.setProperty("--bg",bgCol);
    root.style.setProperty("--line",lineCol);
    // the printed guide is a whisper of the page colour so it sits on any background
    root.style.setProperty("--ghost",mix(bgCol,dark?"#ffffff":"#000000",0.09));
    document.body.classList.toggle("dark",dark);
  }
  // fresh pairing on every load: a quiet page, a confident line
  (function(){
    const dark=Math.random()<0.5;
    bgCol=hslHex(Math.random()*360,18+Math.random()*45,dark?10+Math.random()*10:86+Math.random()*9);
    lineCol=hslHex(Math.random()*360,40+Math.random()*45,dark?76+Math.random()*14:16+Math.random()*16);
    applyColours();
  })();

  /* ---------- SVG helpers ---------- */
  async function loadSvg(url){
    const res=await fetch(url);
    if(!res.ok) throw new Error(url+" -> "+res.status);
    return new DOMParser().parseFromString(await res.text(),"image/svg+xml").documentElement;
  }
  const firstPathD=root=>{
    const p=root.querySelector("path");
    return p?p.getAttribute("d"):null;
  };

  // How many times the spiral winds around its centre — gives the HUD counter
  // its unit ("Loop 12 / 34"). Sampled once per artwork from the centreline.
  function buildWinding(pathEl,samples){
    const L=pathEl.getTotalLength();
    const pts=[];
    for(let i=0;i<=samples;i++)pts.push(pathEl.getPointAtLength(L*i/samples));
    let cx=0,cy=0;
    for(const pt of pts){cx+=pt.x;cy+=pt.y;}
    cx/=pts.length;cy/=pts.length;
    const wind=[0];
    let acc=0,prev=Math.atan2(pts[0].y-cy,pts[0].x-cx);
    for(let i=1;i<pts.length;i++){
      const a=Math.atan2(pts[i].y-cy,pts[i].x-cx);
      let d=a-prev;
      if(d>Math.PI)d-=2*Math.PI;
      if(d<-Math.PI)d+=2*Math.PI;
      acc+=Math.abs(d);
      wind.push(acc);
      prev=a;
    }
    return {length:L,wind,total:Math.max(1,Math.round(acc/(2*Math.PI)))};
  }

  /* ---------- boot one artwork ---------- */
  async function boot(entry,list){
    const dir="art/"+entry.id+"/";
    const [imageRoot,lineRoot]=await Promise.all([
      loadSvg(dir+"image.svg"),loadSvg(dir+"line.svg")
    ]);
    const imageD=firstPathD(imageRoot),lineD=firstPathD(lineRoot);
    if(!imageD||!lineD)throw new Error("art files for '"+entry.id+"' need one <path> each");

    // stage geometry from the image export (both files share the artboard)
    const vb=(imageRoot.getAttribute("viewBox")||"0 0 1080 1080").split(/[\s,]+/).map(Number);
    art.setAttribute("viewBox",vb.join(" "));
    art.style.setProperty("--ar",vb[2]/vb[3]);
    const PEN=entry.pen||15;

    // reveal mask: a stroke that travels along the spiral centreline
    const defs=document.createElementNS(svgNS,"defs");
    const mask=document.createElementNS(svgNS,"mask");
    mask.setAttribute("id","reveal");
    const maskPath=document.createElementNS(svgNS,"path");
    maskPath.setAttribute("d",lineD);
    maskPath.setAttribute("fill","none");
    maskPath.setAttribute("stroke","#fff");
    maskPath.setAttribute("stroke-width",PEN);
    maskPath.setAttribute("stroke-linecap","round");
    maskPath.setAttribute("stroke-linejoin","round");
    mask.appendChild(maskPath);
    defs.appendChild(mask);
    art.appendChild(defs);

    // layer 1: the printed grey guide (the page of the book)
    const ghost=document.createElementNS(svgNS,"path");
    ghost.setAttribute("id","ghost");
    ghost.setAttribute("d",imageD);
    art.appendChild(ghost);

    // layer 2: the same shape in ink, revealed by the mask — never transformed,
    // so the drawing stays register-accurate
    const inkedG=document.createElementNS(svgNS,"g");
    inkedG.setAttribute("mask","url(#reveal)");
    const inked=document.createElementNS(svgNS,"path");
    inked.setAttribute("id","inked");
    inked.setAttribute("d",imageD);
    inkedG.appendChild(inked);
    art.appendChild(inkedG);

    // layer 3: the pen nib
    const pen=document.createElementNS(svgNS,"circle");
    pen.setAttribute("r",PEN*0.75);
    pen.setAttribute("fill","var(--accent)");
    pen.style.stroke="var(--bg)"; // ring in the page colour separates nib from inked line
    pen.setAttribute("stroke-width",PEN*0.2);
    pen.style.opacity=0;
    art.appendChild(pen);

    const {length:L,wind,total:LOOPS}=buildWinding(maskPath,1600);
    maskPath.setAttribute("stroke-dasharray",L+" "+L);
    maskPath.setAttribute("stroke-dashoffset",L);
    maskPath.style.opacity=0; // hide the round cap "dot" before drawing starts

    // per-artwork HUD
    const t=document.getElementById("title");
    t.textContent=entry.title+" ";
    const sp=document.createElement("span");sp.textContent="· scroll to draw";t.appendChild(sp);
    document.getElementById("credit").textContent=entry.credit||"Spiroglyphics · by Thomas Pavitte";
    document.title=entry.title+" · Spiroglyphics";
    done.textContent="✓ Complete — one continuous line, "+LOOPS+" loops";

    // completion book card
    const info=list.find(a=>a.id===entry.id);
    if(info&&info.book){
      bookCard.appendChild(coverEl(info));
      const tx=document.createElement("div");
      const l1=document.createElement("div");l1.className="bcFrom";l1.textContent="From the book";
      const l2=document.createElement("div");l2.className="bcBook";l2.textContent=info.book;
      tx.appendChild(l1);tx.appendChild(l2);
      if(info.buy){
        const a=document.createElement("a");a.className="bcBuy";a.href=info.buy;
        a.target="_blank";a.rel="noopener";a.textContent="Get the book";
        tx.appendChild(a);
      }
      bookCard.appendChild(tx);
      bookCard.dataset.ready="1";
    }

    /* ----- scroll choreography -----
       0.00–0.02  dead zone
       0.02–0.88  the line is drawn, outside in
       0.90–0.96  the grey guide fades — only the inked drawing remains
       0.92+      completion: toast + book card                         */
    const DRAW_A=0.02,DRAW_B=0.88,FADE_A=0.90,FADE_B=0.96;
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    let ticking=false;

    function update(){
      ticking=false;
      const max=document.getElementById("track").offsetHeight-window.innerHeight;
      const p=max>0?clamp(window.scrollY/max,0,1):0;
      bar.style.width=(p*100).toFixed(2)+"%";

      const dr=clamp((p-DRAW_A)/(DRAW_B-DRAW_A),0,1);
      maskPath.setAttribute("stroke-dashoffset",L*(1-dr));
      maskPath.style.opacity=dr>0.0005?1:0;

      const nib=maskPath.getPointAtLength(L*dr);
      pen.setAttribute("cx",nib.x);pen.setAttribute("cy",nib.y);
      pen.style.opacity=(dr>0.0005&&dr<1)?1:0;

      ghost.style.opacity=1-clamp((p-FADE_A)/(FADE_B-FADE_A),0,1);

      const li=Math.min(wind.length-1,Math.round(dr*(wind.length-1)));
      const loop=Math.min(LOOPS,Math.floor(wind[li]/(2*Math.PI))+(dr>0?1:0));
      count.textContent="Loop "+(dr>=1?LOOPS:loop)+" / "+LOOPS;

      done.classList.toggle("show",p>0.92);
      bookCard.classList.toggle("show",p>0.92&&bookCard.dataset.ready==="1");
      if(p>0.9){hint.textContent="Try your own colours ↘";hint.style.opacity=1;}
      else hint.style.opacity=p>0.02?0:1;
    }
    addEventListener("scroll",()=>{if(!ticking){ticking=true;requestAnimationFrame(update);}},{passive:true});
    addEventListener("resize",update);
    update();

    buildColourPanel();
  }

  /* ---------- colours panel: two wells, nothing else ---------- */
  function buildColourPanel(){
    const wellsEl=document.getElementById("wells");
    function makeWell(label,value,onChange){
      const d=document.createElement("label");
      d.className="well";
      const inp=document.createElement("input");
      inp.type="color";inp.value=value;
      inp.addEventListener("input",()=>{onChange(inp.value);applyColours();});
      d.appendChild(inp);
      d.appendChild(document.createTextNode(label));
      wellsEl.appendChild(d);
    }
    makeWell("line",lineCol,v=>lineCol=v);
    makeWell("background",bgCol,v=>bgCol=v);
  }

  /* ---------- gallery / cover tiles ---------- */
  function coverEl(a){
    const d=document.createElement("div");d.className="galCover";
    function letter(){
      let n=a.book||a.title||"?";
      if(n.indexOf(":")>-1)n=n.slice(n.lastIndexOf(":")+1);
      d.textContent=n.trim().replace(/^The\s+/i,"").charAt(0).toUpperCase();
    }
    if(a.cover){
      const img=document.createElement("img");img.src=a.cover;img.alt="";
      img.onerror=function(){img.remove();letter();};
      d.appendChild(img);
    }else letter();
    return d;
  }

  function buildGallery(list,cur){
    const gal=document.getElementById("gallery");
    list.forEach(a=>{
      const item=document.createElement("a");
      item.className="galItem"+(a.id===cur.id?" current":"");
      item.href="?art="+encodeURIComponent(a.id);
      item.appendChild(coverEl(a));
      const tx=document.createElement("div");
      const t1=document.createElement("div");t1.className="galTitle";t1.textContent=a.title;
      const t2=document.createElement("div");t2.className="galBook";t2.textContent=a.book||"";
      tx.appendChild(t1);tx.appendChild(t2);item.appendChild(tx);
      gal.appendChild(item);
    });
    const btn=document.getElementById("galBtn");
    btn.style.display="";
    btn.addEventListener("click",e=>{e.stopPropagation();
      document.getElementById("panel").classList.remove("open");
      gal.classList.toggle("open");});
    document.addEventListener("pointerdown",e=>{
      if(!gal.contains(e.target)&&e.target!==btn)gal.classList.remove("open");});
  }

  /* ---------- buttons ---------- */
  const panel=document.getElementById("panel");
  const inkBtn=document.getElementById("inkBtn");
  inkBtn.addEventListener("click",e=>{e.stopPropagation();
    document.getElementById("gallery").classList.remove("open");
    panel.classList.toggle("open");});
  document.addEventListener("pointerdown",e=>{
    if(!panel.contains(e.target)&&e.target!==inkBtn)panel.classList.remove("open");});
  document.getElementById("guideBtn").addEventListener("click",e=>{
    const off=document.body.classList.toggle("noguide");
    e.target.textContent=off?"Show guide":"Hide guide";
  });

  /* ---------- manifest + start ---------- */
  const FALLBACK=[{id:"elvis",title:"Elvis",book:"Spiroglyphics",cover:"covers/spiroglyphics.jpg"}];
  function start(list){
    const param=(new URLSearchParams(location.search).get("art")||"").toLowerCase();
    const entry=(/^[a-z0-9-]+$/.test(param)&&list.find(a=>a.id===param))||list[0];
    buildGallery(list,entry);
    boot(entry,list).catch(err=>{
      console.error(err);
      if(location.protocol==="file:"){
        count.textContent="Needs a local server";
        hint.textContent="Browsers block loading the art files from file:// — run a static server (e.g. python3 -m http.server) in this folder and open it via http://localhost";
      }else{
        count.textContent="Couldn't load artwork";
        hint.textContent="Check that art/"+entry.id+"/image.svg and line.svg exist";
      }
    });
  }
  const s=document.createElement("script");
  s.src="art/manifest.js";
  s.onload=()=>start(Array.isArray(window.SPIRO_MANIFEST)&&window.SPIRO_MANIFEST.length?window.SPIRO_MANIFEST:FALLBACK);
  s.onerror=()=>start(FALLBACK);
  document.head.appendChild(s);
})();
</script>
</body>
</html>
